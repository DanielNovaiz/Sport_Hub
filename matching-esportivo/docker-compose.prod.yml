services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matching_app_prod
    env_file:
      - .env
    environment:
      APP_ENV: production
      DEBUG: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      SECRET_KEY: ${SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    command: >-
      uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - matching_backend
      - matching_edge
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    container_name: matching_postgres_prod
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME} && psql -U ${DB_USER} -d ${DB_NAME} -tAc 'SELECT PostGIS_Version();' >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - matching_backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: matching_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - matching_backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: matching_nginx_prod
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - matching_backend
      - matching_edge
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  matching_backend:
    driver: bridge
    internal: true
  matching_edge:
    driver: bridge
