name: CI-CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  ci:
    name: Build, Lint and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (Ruff)
        run: |
          ruff check app tests main.py

      - name: Build and start stack
        run: |
          docker compose up -d --build postgres redis app

      - name: Wait for app health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "App is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          docker compose logs app
          exit 1

      - name: Run pytest (28 tests baseline)
        run: |
          docker compose exec -T app pytest tests/ -q --tb=no

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Shutdown stack
        if: always()
        run: docker compose down -v

  cd:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/matching-esportivo:latest
            ghcr.io/${{ github.repository_owner }}/matching-esportivo:${{ github.sha }}

